schema_version: 2

ticket:
  id: TKT-YYYY-MM-DD-short-name
  title: "Short human-readable title"
  repo: "<repo-name>"
  branch: "<target-branch>"
  status: backlog
  created_at: "YYYY-MM-DD"
  owner_agent: "<manager-or-worker-name>"
  ticket_class: implementation
  work_kind: "<feature|bugfix|refactor|test|documentation|diagnosis>"
  phase: "<project-phase-or-milestone>"

context:
  problem: >
    Describe the user-visible or engineering problem this ticket solves.
  current_behavior: >
    Describe the known current behavior. Mark unknowns explicitly.
  desired_behavior: >
    Describe the target behavior and acceptance expectations.
  relevant_prior_work:
    - "Link or path to prior ticket/doc, or 'none'."

spec_refs:
  mode: "full_sdd | no_spec"
  requirements: "templates/specs/<feature>.requirements.md or null"
  design: "templates/specs/<feature>.design.md or null"
  tasks: "templates/specs/<feature>.tasks.md or null"
  delta: "templates/specs/<feature>.delta-spec.md or null"
  not_required_reason: "Required when mode is no_spec. Use only for tiny low-risk work with no behavior, API, data, dependency, security, or UI contract change."
  unresolved_decisions:
    - id: "DEC-001"
      status: "unknown | proposed | accepted | superseded"
      question: "<decision that must be resolved before implementation, or none>"
      blocks_implementation: true

decision_locks:
  locked_decisions:
    - id: "DEC-ACCEPTED-001"
      status: "accepted"
      decision: "<decision already accepted>"
      source: "<spec, ticket, user instruction, or agent/DECISIONS.md>"
      applies_to:
        - "<path or behavior>"
  unresolved_decisions:
    - id: "DEC-BLOCKING-001"
      status: "unknown | proposed"
      question: "<decision that must be resolved before implementation>"
      owner: "<manager|user|domain-owner>"
      blocks_implementation: true

context_budget:
  max_files: 12
  max_summary_lines: 80
  include:
    - "AGENTS.md"
    - "active ticket"
    - "linked specs"
    - "relevant steering"
  exclude:
    - "raw transcripts"
    - "unrelated logs"
    - "secret values"
  required_context:
    - path: "<path>"
      reason: "<why the worker needs it>"

steering:
  required:
    - "templates/steering/security.md"
  conditional:
    - id: product
      when: "product behavior or user outcome changes"
    - id: tech
      when: "implementation, tooling, dependency, or runtime files change"
    - id: testing
      when: "behavior or proof gates change"
    - id: structure
      when: "repository layout or file ownership changes"

scope:
  goal: >
    One concrete outcome for this ticket.
  allowed_files:
    - "tickets/TKT-YYYY-MM-DD-short-name.yaml"
    - "agent/**"
    - "src/**"
    - "tests/**"
  forbidden_files:
    - ".env"
    - ".env.*"
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".next/**"
    - "coverage/**"
  in_scope:
    - "Specific behavior or files the worker may change."
  out_of_scope:
    - "Related work that must not be done in this ticket."

execution:
  execution_intensity: standard_worker
  manager_role: >
    Main Codex agent owns scope, verifies the work, and records proof in this
    ticket. Any Codex subagent inherits the same AGENTS.md rules, ticket scope,
    approval boundaries, forbidden actions, and verification requirements.
  worker_sequence:
    - role: scoped_worker
      mode: implementation
      task: "Implement only the scoped change described in this ticket."
  expert_plan:
    required: false
    planning_reviewer: null
    reviewer: null
    record_location: "execution_result"
  expert_routing:
    native_profiles_preferred: true
    markdown_fallback: "prompts/read-only-expert.md"
    required_profiles: []
    not_required_reason: "Low-risk ticket with no architecture, test, security, UX/accessibility, performance, data/migration, or release/docs risk."
    available_profiles:
      architecture: "expert-architecture-reviewer"
      test: "expert-test-reviewer"
      security: "expert-security-reviewer"
      ux_accessibility: "expert-ux-accessibility-reviewer"
      performance: "expert-performance-reviewer"
      data_migration: "expert-data-migration-reviewer"
      release_docs: "expert-release-docs-reviewer"
    output_required:
      - "profile_used"
      - "trigger"
      - "findings"
      - "required_proof"
      - "bounded_next_action"
  debug_logging_plan:
    owner: scoped_worker
    surfaces:
      - "Browser console when UI behavior is affected."
      - "Server logs when API behavior is affected."
      - "Test output for failing checks."
    temporary_logging_policy: "Remove or gate temporary logs before done."
  test_plan:
    - "Parse this ticket as YAML."
    - "Run formatter/lint command if present."
    - "Run typecheck command if present."
    - "Run targeted unit/integration tests."
    - "Run build command if present."
    - "Check whether agent files need updates and record the result."
  proof_gates:
    - "Implementation matches desired behavior."
    - "Relevant automated checks pass or skipped checks are justified."
    - "Agent-memory update check is recorded."
    - "Ticket result records changed files, commands, proof, and blockers."
    - "Expert routing is used when risk requires it, or an explicit not-required reason is recorded."
    - "Spec drift is checked for non-trivial work, or a concrete no-spec reason is recorded."
  regression_gates:
    - "No unrelated files changed."
    - "No secrets or local machine paths are committed."
    - "No dependency installation, destructive cleanup, remote operation, release, deploy, or external-service action occurs without explicit approval."
    - "Existing public API or UI behavior is preserved unless intentionally changed."
  visual_gate:
    required: false
    required_views: []
    pass_rule: "Not required unless this ticket changes user-facing UI."
  checkpoint_policy: >
    Create a scoped checkpoint commit only after proof passes or after explicit
    user approval.
  rollback_or_accept_policy: >
    If the scoped change fails proof and a bounded fix is not obvious, keep the
    ticket non-done, record the blocker, and do not widen scope without approval.
  stop_conditions:
    - "Required files or commands are missing and cannot be inferred safely."
    - "The change requires editing forbidden files."
    - "Automated proof reveals an unrelated broader failure."
    - "The work requires dependency installation, destructive commands, remote operations, deployment, release, secrets, migrations with side effects, network-dependent setup, or scope expansion without explicit approval."
    - "Full SDD mode references missing requirements, design, or tasks specs."
    - "A blocking requirement or design decision remains unknown or proposed."
    - "Accepted delta specs are not reflected in durable specs and no owner/follow-up is recorded."
    - "Required steering conflicts with accepted decisions or ticket scope."
    - "Context budget cannot include required evidence without raw logs, secrets, or unrelated transcripts."
  handoff_requirements:
    - "Record changed files, commands run, proof result, skipped checks, blockers, risks, agent updates, and next action."
  done_definition: >
    Done when the scoped behavior is implemented, required proof has passed or
    justified skips are recorded, and the execution_result is complete.

execution_result:
  status: pending
  changed_files: []
  commands_run: []
  proof: []
  skipped_checks: []
  agent_memory_updates:
    checked: false
    updated_files: []
    notes: null
  blockers: []
  risks: []
  next_recommended_step: null
