schema_version: 2
ticket:
  id: TKT-2026-06-09-spec-drift-verifier
  title: Add read-only spec drift verifier and cross-artifact proof gate
  repo: agentic-engineering-workflow-template
  branch: main
  status: done
  created_at: '2026-06-09'
  owner_agent: manager
  ticket_class: implementation
  work_kind: test
  phase: sdd-upgrade-v0.4.0
  target_version: 0.4.0
context:
  problem: SDD only works if spec, code, tests, docs, and ticket results stay aligned. The current final
    verifier checks scope and proof, but it does not explicitly compare requirements/design/tasks against
    the implemented diff and tests.
  current_behavior: final-verifier.md validates ticket scope, changed files, proof gates, skipped checks,
    and agent memory. It may catch drift indirectly, but no dedicated spec-alignment verdict exists.
  desired_behavior: A read-only spec drift verifier compares spec artifacts, changed files, tests, docs,
    and execution_result. It returns pass, pass_with_risk, or fail and blocks closing when drift is material.
  relevant_prior_work:
  - 'User-provided iX article: Fünf Tools für Spec-driven Development im Überblick, 2026-06-08'
  - README.md
  - docs/workflow.md
  - templates/AGENTS.md.template
scope:
  goal: Create a spec drift verification prompt/checklist and wire it into final verification and execution_result.
  allowed_files:
  - tickets/sdd-upgrade/TKT-2026-06-09-spec-drift-verifier.yaml
  - prompts/spec-drift-verifier.md
  - prompts/final-verifier.md
  - checklists/spec-drift.md
  - checklists/closeout.md
  - templates/TEMPLATE.execution-result.yaml
  - templates/TEMPLATE.ticket.yaml
  forbidden_files:
  - .env
  - .env.*
  - node_modules/**
  - dist/**
  - build/**
  - .next/**
  - coverage/**
  in_scope:
  - Add prompts/spec-drift-verifier.md for read-only comparison of requirements, design, tasks, code diff,
    tests, docs, and ticket result.
  - 'Add checklists/spec-drift.md with required questions: implemented-but-unspecified, specified-but-unimplemented,
    tests-missing-for-acceptance, docs-outdated, changed behavior not approved.'
  - Add execution_result.spec_alignment with verdict, checked_specs, drift_findings, required_followups.
  - Update final-verifier.md to require spec_alignment for non-trivial tickets.
  - Update closeout checklist to require drift result or quick-flow exemption.
  out_of_scope:
  - Do not auto-rewrite product code in the verifier.
  - Do not treat every docs-only ticket as requiring full drift verification.
  - Do not create a remote CI integration in this ticket.
execution:
  execution_intensity: expert_supported
  manager_role: Main Codex agent owns scope, verifies the work, and records proof in this ticket. Any
    Codex subagent inherits AGENTS.md, the active ticket scope, approval boundaries, forbidden actions,
    and verification requirements.
  worker_sequence:
  - role: read_only_reviewer
    mode: read_only
    task: Review the planned workflow/template changes for SDD usefulness, risk, and minimality before
      edits.
  - role: scoped_worker
    mode: implementation
    task: Implement only the scoped workflow/template change described in this ticket.
  expert_plan:
    required: true
    planning_reviewer: read-only Codex reviewer
    reviewer: final verifier
    record_location: execution_result
  debug_logging_plan:
    owner: scoped_worker
    surfaces:
    - YAML parse output
    - Markdown link/path inspection
    - grep output for version and old terminology
    temporary_logging_policy: Do not add temporary logs to template files; record command output only
      in ticket execution_result.
  test_plan:
  - Parse every changed YAML file with python -c "import yaml, pathlib; [yaml.safe_load(p.read_text())
    for p in pathlib.Path('.').rglob('*.yaml')]".
  - Run markdown/path consistency checks manually or with grep for all newly referenced template paths.
  - Check whether README, docs/workflow.md, AGENTS template, prompts, checklists, ticket templates, and
    agent memory files need updates and record the result.
  proof_gates:
  - Changed templates and tickets are internally consistent and parseable where applicable.
  - The workflow change is bounded to SDD/context-engineering support and does not alter product runtime
    assumptions.
  - Agent-memory update check is recorded.
  - Ticket result records changed files, commands, proof, skipped checks, blockers, and risks.
  - A non-trivial ticket cannot be marked done without spec_alignment or a documented exemption.
  - Spec drift verifier is read-only and cannot repair issues without a separate scoped repair ticket.
  - Execution result template has a machine-readable spec_alignment block.
  regression_gates:
  - No unrelated files changed.
  - No secrets, credentials, or private local paths are introduced.
  - No dependency installation, destructive cleanup, remote operation, release, deploy, or external-service
    action occurs without explicit approval.
  - Existing Codex scoped-worker/orchestrator safety boundaries remain stricter or equivalent after the
    change.
  visual_gate:
    required: false
    required_views: []
    pass_rule: Not required; this is a workflow/template change.
  checkpoint_policy: Create a scoped checkpoint commit only after proof passes or after explicit user
    approval.
  rollback_or_accept_policy: If the scoped change makes the workflow ambiguous or less safe, keep the
    ticket non-done, record the blocker, and propose a smaller follow-up ticket.
  stop_conditions:
  - The change would require product-repository assumptions that are not available in the template source.
  - The change requires editing forbidden files.
  - The design would weaken approval boundaries, proof gates, or scoped file ownership.
  - The work requires dependency installation, destructive commands, remote operations, deployment, release,
    secrets, migrations with side effects, network-dependent setup, or scope expansion without explicit
    approval.
  handoff_requirements:
  - Record changed files, commands run, proof result, skipped checks, blockers, risks, agent updates,
    and next action.
  done_definition: Done when the scoped workflow/template improvement is implemented, required proof has
    passed or justified skips are recorded, and execution_result is complete.
execution_result:
  status: done
  changed_files:
  - tickets/sdd-upgrade/TKT-2026-06-09-spec-drift-verifier.yaml
  - prompts/spec-drift-verifier.md
  - prompts/final-verifier.md
  - checklists/spec-drift.md
  - checklists/closeout.md
  - templates/TEMPLATE.execution-result.yaml
  - templates/TEMPLATE.ticket.yaml
  commands_run:
  - pwd && git status --short --branch
  - rg --files
  - sed -n '1,240p' tickets/sdd-upgrade/TKT-2026-06-09-spec-drift-verifier.yaml
  - find .. -name AGENTS.md -print
  - sed -n '1,260p' prompts/final-verifier.md
  - test -f prompts/spec-drift-verifier.md && sed -n '1,260p' prompts/spec-drift-verifier.md
    || true
  - test -f checklists/spec-drift.md && sed -n '1,240p' checklists/spec-drift.md
    || true
  - sed -n '1,260p' checklists/closeout.md
  - sed -n '1,260p' templates/TEMPLATE.execution-result.yaml
  - sed -n '1,320p' templates/TEMPLATE.ticket.yaml
  - rg -n "spec_alignment|quick_flow|delta-spec|expert_routing|execution_result:"
    tickets/sdd-upgrade templates prompts checklists
  - sed -n '1,260p' tickets/sdd-upgrade/TKT-2026-06-09-delta-spec-lifecycle.yaml
  - sed -n '1,260p' prompts/scoped-worker.md
  - sed -n '1,260p' prompts/manager-orchestrator.md
  - git diff -- prompts/spec-drift-verifier.md prompts/final-verifier.md checklists/spec-drift.md
    checklists/closeout.md templates/TEMPLATE.execution-result.yaml templates/TEMPLATE.ticket.yaml
  - rg -n "spec-drift|spec_alignment|implemented-but-unspecified|specified-but-unimplemented|tests-missing-for-acceptance|docs-outdated|changed-behavior-not-approved|read-only|quick_flow_exemption|delta-spec|expert_routing|spec_contract|spec_refs"
    prompts checklists templates tickets/sdd-upgrade/TKT-2026-06-09-spec-drift-verifier.yaml
  - python -c "import yaml, pathlib; [yaml.safe_load(p.read_text()) for p in pathlib.Path('.').rglob('*.yaml')]"
  - git diff --name-only
  - git diff --check
  - git status --short
  - if rg -n "[ \t]+$" prompts/spec-drift-verifier.md checklists/spec-drift.md; then exit 1; else
    echo "no trailing whitespace in new markdown files"; fi
  proof:
  - Added prompts/spec-drift-verifier.md with a read-only verifier prompt that compares requirements,
    design, tasks, delta specs, current/archive specs, changed files, tests, docs, and execution_result.
  - Added checklists/spec-drift.md with required implemented-but-unspecified, specified-but-unimplemented,
    tests-missing-for-acceptance, docs-outdated, and changed-behavior-not-approved checks.
  - Updated prompts/final-verifier.md to require execution_result.spec_alignment for non-trivial tickets
    unless a justified quick-flow exemption is recorded.
  - Updated checklists/closeout.md to require a drift result or quick-flow exemption and to preserve the
    read-only/no-auto-repair boundary.
  - Updated templates/TEMPLATE.execution-result.yaml and templates/TEMPLATE.ticket.yaml with a
    machine-readable spec_alignment block containing verdict, checked_specs, drift_findings, and
    required_followups.
  - Verified the scoped change preserves spec_refs/spec_contract, delta lifecycle wording, expert routing,
    and separate scoped repair-ticket boundaries.
  - YAML parse passed for repository *.yaml files.
  - git diff --check passed.
  - New untracked Markdown files were checked directly for trailing whitespace and passed.
  spec_alignment:
    verdict: pass
    checked_specs:
    - tickets/sdd-upgrade/TKT-2026-06-09-spec-drift-verifier.yaml
    - prompts/spec-drift-verifier.md
    - prompts/final-verifier.md
    - checklists/spec-drift.md
    - checklists/closeout.md
    - templates/TEMPLATE.execution-result.yaml
    - templates/TEMPLATE.ticket.yaml
    drift_findings: []
    required_followups: []
  skipped_checks:
  - check: formatter/lint/typecheck/unit tests/build/browser proof
    reason: This ticket only changes Markdown and YAML workflow templates; no repo-local formatter,
      typecheck, unit test, build, or browser check is required by the ticket.
  - check: README.md, docs/workflow.md, templates/AGENTS.md.template, and agent/*.md edits
    reason: Checked for need during scope review; no update was required for this narrow workflow hook,
      and these paths are outside this ticket's allowed_files or explicitly forbidden by user instruction.
  agent_memory_updates:
    checked: true
    updated_files: []
    notes: "agent memory checked: no update needed; this template ticket does not change target-repo runtime state, and agent/*.md edits are explicitly out of scope."
  blockers: []
  risks:
  - 'Risk: false positives on intentionally changed scope; mitigate by allowing pass_with_risk plus explicit
    decision record and required follow-up tickets.'
  - 'Risk: existing target repositories must add spec_alignment to active tickets manually when adopting this
    template update.'
  next_recommended_step: Use the spec drift verifier during closeout of the next non-trivial ticket and
    record execution_result.spec_alignment before final verification.
